<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    onAuthStateChanged,
    signOut
  } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
  import {
    initializeFirestore,
    persistentLocalCache,
    doc,
    getDoc,
    setDoc
  } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCSkVVTqhBpaDUDTxmxkDTyyfvtEIvyBi4",
    authDomain: "plan-calendar-d49fc.firebaseapp.com",
    projectId: "plan-calendar-d49fc",
    storageBucket: "plan-calendar-d49fc.firebasestorage.app",
    messagingSenderId: "52113565939",
    appId: "1:52113565939:web:a3c1ae95760c5f229d6f86"
  };

  window.addEventListener('DOMContentLoaded', () => {
    const bridge = window.planCalendarFirebaseBridge;
    if (!bridge) return;
    if (location.protocol === 'file:') {
      bridge.showFileMode();
      return;
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });
    const provider = new GoogleAuthProvider();
    let currentUser = null;
    let pushTimer = null;
    let pushing = false;
    let pushQueued = false;

    const calendarRef = user => doc(db, 'users', user.uid, 'data', 'calendar');
    const syncedLabel = () => `동기화됨 · ${new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
    const isRemoteData = data => data && typeof data.updatedAt === 'string'
      && Number.isFinite(Date.parse(data.updatedAt))
      && Array.isArray(data.plans) && Array.isArray(data.events);

    async function pushData() {
      clearTimeout(pushTimer);
      if (!currentUser) return;
      if (pushing) {
        pushQueued = true;
        return;
      }

      pushing = true;
      const userId = currentUser.uid;
      const payload = bridge.ensureLocalTimestamp();
      const pushedAt = payload.updatedAt;
      bridge.setStatus('동기화 중…');
      try {
        await setDoc(calendarRef(currentUser), payload);
        if (!currentUser || currentUser.uid !== userId) return;
        bridge.setStatus(syncedLabel());
      } catch (error) {
        console.warn('Firestore 동기화가 보류되었습니다.', error);
        bridge.setStatus('동기화 대기 중');
      } finally {
        pushing = false;
        if (pushQueued || bridge.getLocalData().updatedAt !== pushedAt) {
          pushQueued = false;
          schedulePush();
        }
      }
    }

    function schedulePush() {
      if (!currentUser) return;
      clearTimeout(pushTimer);
      pushTimer = setTimeout(pushData, 2000);
    }

    async function reconcile(user) {
      bridge.setStatus('동기화 중…');
      try {
        const snapshot = await getDoc(calendarRef(user));
        const remote = snapshot.exists() ? snapshot.data() : null;
        const local = bridge.getLocalData();
        const remoteTime = isRemoteData(remote) ? Date.parse(remote.updatedAt) : 0;
        const localTime = Date.parse(local.updatedAt) || 0;

        // ponytail: LWW 동기화, 병합 필요해지면 항목 단위 merge로 업그레이드
        if (remoteTime > localTime) {
          bridge.applyRemoteData(remote);
        } else if (!snapshot.exists() || !isRemoteData(remote) || localTime > remoteTime) {
          await setDoc(calendarRef(user), bridge.ensureLocalTimestamp());
        }
        bridge.setStatus(syncedLabel());
      } catch (error) {
        console.warn('Firestore 초기 동기화를 완료하지 못했습니다.', error);
        bridge.setStatus('동기화 대기 중');
      }
    }

    async function login() {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.warn('Google 로그인 팝업을 사용할 수 없어 리디렉션으로 전환합니다.', error);
        await signInWithRedirect(auth, provider);
      }
    }

    document.getElementById('googleLoginBtn').addEventListener('click', () => {
      login().catch(error => {
        console.warn('Google 로그인에 실패했습니다.', error);
        bridge.setStatus('로그인 오류 — 다시 시도하세요', true);
      });
    });
    document.getElementById('googleLogoutBtn').addEventListener('click', () => {
      signOut(auth).catch(error => {
        console.warn('Google 로그아웃에 실패했습니다.', error);
        bridge.setStatus('로그아웃 오류 — 다시 시도하세요', true);
      });
    });

    window.planCalendarFirebaseSync = { schedulePush };
    getRedirectResult(auth).catch(error => {
      console.warn('Google 리디렉션 로그인에 실패했습니다.', error);
      bridge.setStatus('로그인 오류 — 다시 시도하세요', true);
    });
    onAuthStateChanged(auth, user => {
      currentUser = user;
      clearTimeout(pushTimer);
      if (!user) {
        bridge.showSignedOut();
        return;
      }
      bridge.showSignedIn(user.email || 'Google 사용자');
      reconcile(user);
    });
  });
</script>

<style>
  :root {
    --accent: #4f6ef7;
    --accent-hover: #405ee7;
    --accent-strong: #344bc0;
    --accent-soft: #eef1ff;
    --bg: #f6f7f9;
    --card: #ffffff;
    --surface-subtle: #f9fafb;
    --surface-hover: #f6f8fa;
    --line: #e5e7eb;
    --line-strong: #d1d5db;
    --text: #1f2328;
    --text-subtle: #57606a;
    --muted: #8c959f;
    --danger: #cf222e;
    --danger-soft: #ffebe9;
    --holiday: #cf4b4b;
    --shadow: 0 1px 2px rgba(31,35,40,.04), 0 8px 24px rgba(31,35,40,.05);
    --shadow-popover: 0 16px 40px rgba(31,35,40,.18), 0 3px 10px rgba(31,35,40,.08);
    --radius: 12px;
    --radius-sm: 7px;
  }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }

  html, body { height: 100%; }

  body {
    margin: 0;
    padding: 20px;
    display: flex;
    gap: 18px;
    overflow: hidden;
    color: var(--text);
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    font-size: 14px;
    letter-spacing: -.012em;
  }

  button, input, textarea { font: inherit; }
  button { color: inherit; }

  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  input:not([type="checkbox"]):not([type="color"]), textarea {
    width: 100%;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--card);
    color: var(--text);
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  input:not([type="checkbox"]):not([type="color"]) { height: 34px; padding: 6px 10px; }
  textarea { min-height: 88px; padding: 9px 10px; resize: vertical; line-height: 1.5; }

  input:not([type="checkbox"]):not([type="color"]):focus, textarea:focus {
    border-color: var(--accent);
    outline: 0;
    box-shadow: 0 0 0 3px rgba(79,110,247,.14);
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cdd2d8; border: 3px solid transparent; border-radius: 999px; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background-color: #aeb5bd; }

  .btn {
    min-height: 32px;
    padding: 5px 12px;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    background: var(--card);
    box-shadow: 0 1px 0 rgba(31,35,40,.04);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .08s ease;
  }

  .btn:hover { background: var(--surface-hover); border-color: #b8bec6; }
  .btn:active { transform: translateY(1px); box-shadow: none; }
  .btn-primary { border-color: var(--accent); background: var(--accent); color: #fff; }
  .btn-primary:hover { border-color: var(--accent-hover); background: var(--accent-hover); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { border-color: #ffb4ae; background: var(--danger-soft); }

  #sidebar, #main {
    min-height: 0;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--card);
    box-shadow: var(--shadow);

    min-width: 316px;

  #googleLogoutBtn { min-height: 28px; padding: 3px 8px; font-size: 10px; }
  .sync-status { min-height: 16px; margin-top: 7px; color: var(--muted); font-size: 10px; line-height: 1.45; }
  .sync-status.error { color: var(--danger); font-weight: 600; }

    flex: none;

  .sidebar-utilities .btn:hover { color: var(--accent-strong); }

  .plan-card {
    margin-bottom: 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--card);
    transition: border-color .18s ease, box-shadow .18s ease;
  }

  .plan-card:hover { border-color: #d7dbe0; box-shadow: 0 3px 10px rgba(31,35,40,.05); }

  .plan-head {
    min-height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 9px 8px 12px;
    cursor: pointer;
    user-select: none;

  }

  .plan-head:hover { background: var(--surface-hover); }
  .vis-cb { width: 15px; height: 15px; margin: 0; accent-color: var(--accent); cursor: pointer; }
  .plan-color-dot { width: 9px; height: 9px; flex: none; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }
  .plan-title-wrap { min-width: 0; flex: 1; }
  .plan-name { display: block; overflow: hidden; font-size: 13px; font-weight: 650; text-overflow: ellipsis; white-space: nowrap; }

  .chevron { width: 16px; color: var(--muted); font-size: 14px; text-align: center; transition: transform .22s ease; }

  .icon-btn {

  .item-row:last-child { border-bottom: 0; }

    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;

  .cell.other-month { background: #fbfcfd; }

  .cell-top { min-height: 24px; display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
  .date-num { width: 24px; height: 24px; flex: none; border-radius: 7px; color: var(--text-subtle); font-size: 12px; font-weight: 600; line-height: 24px; text-align: center; }
  .other-month .date-num { color: #afb6bf; }
  .cell.sunday .date-num, .cell.holiday .date-num { color: var(--holiday); }
  .cell.today .date-num { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(79,110,247,.3); }

  .holiday-label, .anniversary-label { min-width: 0; margin-top: 3px; overflow: hidden; font-size: 10px; font-weight: 600; line-height: 16px; text-overflow: ellipsis; white-space: nowrap; }
  .holiday-label { color: #a84b4b; }
  .anniversary-label { color: var(--muted); }
  .chip-list { display: flex; flex-direction: column; gap: 4px; }
  .chip { width: 100%; min-height: 22px; display: flex; align-items: center; gap: 5px; padding: 3px 7px; border: 0; border-radius: 6px; overflow: hidden; font-size: 11px; font-weight: 600; line-height: 16px; text-align: left; white-space: nowrap; }

  .plan-chip { cursor: default; }

  .event-dot { width: 5px; height: 5px; flex: none; border-radius: 50%; background: currentColor; opacity: .72; }
  .more-btn { align-self: flex-start; padding: 2px 5px; border: 0; border-radius: 5px; background: transparent; color: var(--accent-strong); cursor: pointer; font-size: 11px; font-weight: 650; }
  .more-btn:hover { background: var(--accent-soft); }

  dialog {
    width: min(420px, calc(100vw - 32px));
    padding: 0;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-popover);
  }

  const yearKey = String(year);
  const cached = holidayCache[yearKey];
  if (cached?.data && Date.now() - Number(cached.fetchedAt) < HOLIDAY_CACHE_TTL) return;
  if (holidayFetches.has(yearKey)) return;
  holidayFetches.add(yearKey);

  try {
    const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${yearKey}/KR`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const rows = await response.json();
    if (!Array.isArray(rows)) throw new Error('잘못된 API 응답');

    const data = {};
    rows.forEach(item => {
      if (/^\d{4}-\d{2}-\d{2}$/.test(item?.date) && typeof item.localName === 'string' && item.localName) {
        data[item.date] = item.localName;
      }
    });
    holidayCache[yearKey] = { data, fetchedAt: Date.now() };
    localStorage.setItem(HOLIDAY_CACHE_KEY, JSON.stringify(holidayCache));
    if (viewYear === year) renderCalendar();
  } catch (error) {
    console.warn(`${yearKey}년 공휴일 갱신에 실패해 내장 데이터를 사용합니다.`, error);
  } finally {
    holidayFetches.delete(yearKey);
  }
}

function firebasePayload(ensureTimestamp = false) {
  if (ensureTimestamp && !firebaseMeta.updatedAt) {
    firebaseMeta.updatedAt = new Date().toISOString();
    saveFirebaseMeta();
  }
  return { version: 1, updatedAt: firebaseMeta.updatedAt || '', plans, events: personalEvents };
}

function applyFirebaseRemoteData(data) {
  localStorage.setItem(STORE_KEY, JSON.stringify(data.plans));
  localStorage.setItem(EVENT_STORE_KEY, JSON.stringify(data.events));
  plans = data.plans;
  personalEvents = data.events;
  firebaseMeta.updatedAt = data.updatedAt;
  saveFirebaseMeta();
  openPlanId = null;
  expandedCellDates.clear();
  render();
}

function markLocalChange() {
  firebaseMeta.updatedAt = new Date().toISOString();
  saveFirebaseMeta();
  window.planCalendarFirebaseSync?.schedulePush();
}

window.planCalendarFirebaseBridge = {
  getLocalData: () => firebasePayload(false),
  ensureLocalTimestamp: () => firebasePayload(true),
  applyRemoteData: applyFirebaseRemoteData,
  showFileMode: showFirebaseFileMode,
  showSignedOut: showFirebaseSignedOut,
  showSignedIn: showFirebaseSignedIn,
  setStatus: setFirebaseStatus
};

function saveData(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
  markLocalChange();
}

function savePlans() { saveData(STORE_KEY, plans); }
function saveEvents() { saveData(EVENT_STORE_KEY, personalEvents); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function parseDateStr(value) {
  const [year, month, day] = value.split('-').map(Number);
  return new Date(year, month - 1, day);
}

function addDays(date, amount) { return new Date(date.getFullYear(), date.getMonth(), date.getDate() + amount); }

function dateKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function sameDate(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function escapeHtml(value) {
  const element = document.createElement('div');
  element.textContent = value == null ? '' : String(value);
  return element.innerHTML;
}

function softColor(hex, alpha = '20') {
  return /^#[0-9a-f]{6}$/i.test(hex) ? `${hex}${alpha}` : '#eef1ff';
}

function readableColor(hex) {
  return /^#[0-9a-f]{6}$/i.test(hex) ? hex : '#405ee7';
}

function addPlan() {
  const plan = {
    id: uid(),
    name: '새 계획',
    category: '기타',
    color: PALETTE[plans.length % PALETTE.length],
    startDate: dateKey(new Date()),
    visible: true,
    items: []
  };
  plans.push(plan);
  openPlanId = plan.id;
  savePlans();
  render();
  requestAnimationFrame(() => document.querySelector(`.plan-card[data-id="${plan.id}"] .name-in`)?.select());
}

function deletePlan(id) {
  const plan = plans.find(item => item.id === id);
  if (!plan || !confirm(`"${plan.name}" 계획을 삭제하시겠습니까? 포함된 일정도 캘린더에서 사라집니다.`)) return;
  plans = plans.filter(item => item.id !== id);
  if (openPlanId === id) openPlanId = null;
  savePlans();
  render();
}

function addItem(planId, form) {
  const plan = plans.find(item => item.id === planId);
  if (!plan) return;
  const titleInput = form.querySelector('.title-in');
  const title = titleInput.value.trim();
  if (!title) return titleInput.focus();
  const offset = parseInt(form.querySelector('.offset-in').value, 10) || 0;
  const duration = Math.max(1, parseInt(form.querySelector('.dur-in').value, 10) || 1);
  plan.items = Array.isArray(plan.items) ? plan.items : [];
  plan.items.push({ id: uid(), title, offset, duration });
  savePlans();
  render();
}

function deleteItem(planId, itemId) {
  const plan = plans.find(item => item.id === planId);
  if (!plan) return;
  plan.items = (Array.isArray(plan.items) ? plan.items : []).filter(item => item.id !== itemId);
  savePlans();
  render();
}

function renderEventList() {
  const list = document.getElementById('eventList');
  const count = document.getElementById('eventCount');
  const today = dateKey(new Date());
  list.innerHTML = '';
  count.textContent = `개별 일정 ${personalEvents.length}개`;

  if (!personalEvents.length) {
    list.innerHTML = '<div class="empty-events">저장된 개별 일정이 없습니다.</div>';
    return;
  }

  personalEvents
    .slice()
    .sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.title || '').localeCompare(b.title || ''))
    .forEach(event => {
      const row = document.createElement('div');
      row.className = `sidebar-event${event.date && event.date < today ? ' past' : ''}`;

      const main = document.createElement('button');
      main.type = 'button';
      main.className = 'sidebar-event-main';
      main.title = event.note || event.title;
      const eventDate = event.date ? parseDateStr(event.date) : null;
      const dateLabel = eventDate
        ? `${eventDate.getFullYear()}. ${eventDate.getMonth() + 1}. ${eventDate.getDate()}. (${DOW[eventDate.getDay()]})`
        : '날짜 없음';
      main.innerHTML = `
        <span class="sidebar-event-dot" style="background:${readableColor(event.color)}"></span>
        <span class="sidebar-event-title">${escapeHtml(event.title)}</span>
        <span class="sidebar-event-date">${dateLabel}</span>
      `;
      main.addEventListener('click', () => openEventDialog(event.date || today, event.id));

      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'icon-btn';
      remove.title = '일정 삭제';
      remove.setAttribute('aria-label', `${event.title} 삭제`);
      remove.textContent = '×';
      remove.addEventListener('click', () => deleteEventById(event.id));

      row.append(main, remove);
      list.appendChild(row);
    });
}

function getPlanEventsForDate(date) {
  const result = [];
  plans.forEach(plan => {
    if (plan.visible === false || !plan.startDate) return;
    const start = parseDateStr(plan.startDate);
    (Array.isArray(plan.items) ? plan.items : []).forEach(item => {
      const eventStart = addDays(start, Number(item.offset) || 0);
      const eventEnd = addDays(eventStart, Math.max(1, Number(item.duration) || 1) - 1);
      if (date >= eventStart && date <= eventEnd) result.push({ type: 'plan', plan, item });
    });
  });
  return result;
}

function getPersonalEventsForDate(key) {
  return personalEvents.filter(event => event.date === key).map(event => ({ type: 'personal', event }));
}

function createChip(entry) {
  const chip = document.createElement(entry.type === 'personal' ? 'button' : 'div');
  const color = readableColor(entry.type === 'personal' ? entry.event.color : entry.plan.color);
  const title = entry.type === 'personal' ? entry.event.title : entry.item.title;
  chip.className = `chip ${entry.type === 'personal' ? 'event-chip' : 'plan-chip'}`;
  chip.style.background = softColor(color);
  chip.style.color = color;
  chip.innerHTML = `${entry.type === 'personal' ? '<span class="event-dot"></span>' : ''}<span class="chip-title">${escapeHtml(title)}</span>`;

  if (entry.type === 'personal') {
    chip.type = 'button';
    chip.title = entry.event.note ? `${title}\n${entry.event.note}` : `${title} · 클릭하여 수정`;
    chip.addEventListener('click', event => {
      event.stopPropagation();
      openEventDialog(entry.event.date, entry.event.id);
    });
  } else {
    chip.title = `${entry.plan.name} · ${title}`;
    chip.addEventListener('click', event => event.stopPropagation());
  }
  return chip;
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${viewYear}년 ${viewMonth + 1}월`;
  document.getElementById('holidayToggle').checked = showHolidays;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  DOW.forEach((day, index) => {
    const heading = document.createElement('div');
    heading.className = `dow${index === 0 ? ' sun' : index === 6 ? ' sat' : ''}`;
    heading.textContent = day;
    grid.appendChild(heading);
  });

  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const gridStart = addDays(firstOfMonth, -firstOfMonth.getDay());
  const today = new Date();

  for (let index = 0; index < 42; index++) {
      const cellDate = addDays(gridStart, index);
      const key = dateKey(cellDate);
      const holiday = showHolidays ? getHolidayName(key) : null;
      const anniversary = showHolidays && !holiday ? ANNIVERSARIES[key.slice(5)] : null;
      const entries = [...getPlanEventsForDate(cellDate), ...getPersonalEventsForDate(key)];
    const expanded = expandedCellDates.has(key);
    const visibleEntries = expanded ? entries : entries.slice(0, CHIP_LIMIT);

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.tabIndex = 0;
    cell.setAttribute('role', 'button');
    cell.setAttribute('aria-label', `${cellDate.getFullYear()}년 ${cellDate.getMonth() + 1}월 ${cellDate.getDate()}일 일정 추가`);
    if (cellDate.getMonth() !== viewMonth) cell.classList.add('other-month');
    if (cellDate.getDay() === 0) cell.classList.add('sunday');
    if (sameDate(cellDate, today)) cell.classList.add('today');
    if (holiday) cell.classList.add('holiday');

      const top = document.createElement('div');
      top.className = 'cell-top';
      top.innerHTML = `<span class="date-num">${cellDate.getDate()}</span>${holiday ? `<span class="holiday-label" title="${escapeHtml(holiday)}">${escapeHtml(holiday)}</span>` : anniversary ? `<span class="anniversary-label" title="${escapeHtml(anniversary)}">${escapeHtml(anniversary)}</span>` : ''}`;
    cell.appendChild(top);

    const chipList = document.createElement('div');
    chipList.className = 'chip-list';
    visibleEntries.forEach(entry => chipList.appendChild(createChip(entry)));

    if (entries.length > CHIP_LIMIT) {
      const more = document.createElement('button');
      more.type = 'button';
      more.className = 'more-btn';
      more.textContent = expanded ? '접기' : `+${entries.length - CHIP_LIMIT}개`;
      more.addEventListener('click', event => {
        event.stopPropagation();
        expanded ? expandedCellDates.delete(key) : expandedCellDates.add(key);
        renderCalendar();
      });
      chipList.appendChild(more);
    }
    cell.appendChild(chipList);

    const openForCell = () => openEventDialog(key);
    cell.addEventListener('click', openForCell);
    cell.addEventListener('keydown', event => {
      if (event.target !== cell) return;
      if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); openForCell(); }
    });
    grid.appendChild(cell);
  }
}

function openEventDialog(date, eventId = null) {
  const dialog = document.getElementById('eventDialog');
  const existing = eventId ? personalEvents.find(event => event.id === eventId) : null;
  editingEventId = existing ? existing.id : null;
  editingEventDate = existing ? existing.date : date;
  document.getElementById('eventDialogTitle').textContent = existing ? '개별 일정 수정' : '개별 일정 추가';
  const selectedDate = parseDateStr(editingEventDate);
  document.getElementById('eventDateLabel').textContent = `${selectedDate.getFullYear()}년 ${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일 (${DOW[selectedDate.getDay()]})`;
  document.getElementById('eventTitle').value = existing?.title || '';
  document.getElementById('eventDate').value = editingEventDate;
  document.getElementById('eventColor').value = readableColor(existing?.color || PALETTE[personalEvents.length % PALETTE.length] || '#4f6ef7');
  document.getElementById('eventNote').value = existing?.note || '';
  document.getElementById('deleteEventBtn').hidden = !existing;
  dialog.showModal();
  requestAnimationFrame(() => document.getElementById('eventTitle').focus());
}

function closeEventDialog() {
  document.getElementById('eventDialog').close();
  editingEventId = null;
  editingEventDate = null;
}

function savePersonalEvent() {
  const titleInput = document.getElementById('eventTitle');
  const dateInput = document.getElementById('eventDate');
  const title = titleInput.value.trim();
  if (!title) return titleInput.focus();
  if (!dateInput.value) return dateInput.focus();
  const data = {
    date: dateInput.value,
    title,
    color: document.getElementById('eventColor').value,
    note: document.getElementById('eventNote').value.trim()
  };

  if (editingEventId) {
    const existing = personalEvents.find(event => event.id === editingEventId);
    if (existing) Object.assign(existing, data);
  } else {
    personalEvents.push({ id: uid(), ...data });
  }
  saveEvents();
  closeEventDialog();
  renderEventList();
  renderCalendar();
}

function deleteEventById(id) {
  const existing = personalEvents.find(event => event.id === id);
  if (!existing || !confirm(`"${existing.title}" 일정을 삭제하시겠습니까?`)) return;
  personalEvents = personalEvents.filter(event => event.id !== id);
  saveEvents();
  if (document.getElementById('eventDialog').open) closeEventDialog();
  renderEventList();
  renderCalendar();
}

function deletePersonalEvent() { deleteEventById(editingEventId); }

function exportBackup() {
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    plans,
    events: personalEvents
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `계획캘린더-백업-${dateKey(new Date())}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

async function importBackup(file) {
  try {
    const backup = JSON.parse(await file.text());
    if (!backup || !Array.isArray(backup.plans) || !Array.isArray(backup.events)) {
      throw new Error('올바르지 않은 백업 형식');
    }
    if (!confirm('현재 데이터를 백업 파일 내용으로 교체합니다. 계속할까요?')) return;

    const previousPlans = plans;
    const previousEvents = personalEvents;
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(backup.plans));
      localStorage.setItem(EVENT_STORE_KEY, JSON.stringify(backup.events));
    } catch (error) {
      localStorage.setItem(STORE_KEY, JSON.stringify(previousPlans));
      localStorage.setItem(EVENT_STORE_KEY, JSON.stringify(previousEvents));
      throw error;
    }

    plans = backup.plans;
    personalEvents = backup.events;
    openPlanId = null;
    expandedCellDates.clear();
    markLocalChange();
    render();
  } catch (error) {
    console.warn('백업 파일 가져오기에 실패했습니다.', error);
    alert('백업 파일을 가져올 수 없습니다. 올바른 계획 캘린더 JSON 파일인지 확인해주세요.');
  }
}

function render() {
  renderSidebar();
  renderEventList();
  renderCalendar();
}

}

document.getElementById('mobileMenuBtn').addEventListener('click', () => {
  setSidebarOpen(!document.body.classList.contains('sidebar-open'));
});
document.getElementById('sidebarBackdrop').addEventListener('click', () => setSidebarOpen(false));
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && document.body.classList.contains('sidebar-open')) setSidebarOpen(false);
});
mobileMedia.addEventListener('change', () => setSidebarOpen(false));

document.getElementById('newPlanBtn').addEventListener('click', addPlan);
document.getElementById('newEventBtn').addEventListener('click', () => openEventDialog(dateKey(new Date())));
document.getElementById('exportBtn').addEventListener('click', exportBackup);
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', event => {
  const file = event.target.files[0];
  if (file) importBackup(file);
  event.target.value = '';
});
document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  expandedCellDates.clear();
  renderCalendar();
  refreshHolidays(viewYear);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  expandedCellDates.clear();
  renderCalendar();
  refreshHolidays(viewYear);
});
document.getElementById('todayBtn').addEventListener('click', () => {
  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  expandedCellDates.clear();
  renderCalendar();
  refreshHolidays(viewYear);
});
document.getElementById('holidayToggle').addEventListener('change', event => {
  showHolidays = event.target.checked;
  localStorage.setItem(HOLIDAY_PREF_KEY, String(showHolidays));
  renderCalendar();
});
document.getElementById('eventForm').addEventListener('submit', event => {
  event.preventDefault();
  savePersonalEvent();
});
document.getElementById('eventDate').addEventListener('change', event => {
  if (!event.target.value) return;
  editingEventDate = event.target.value;
  const selectedDate = parseDateStr(editingEventDate);
  document.getElementById('eventDateLabel').textContent = `${selectedDate.getFullYear()}년 ${selectedDate.getMonth() + 1}월 ${selectedDate.getDate()}일 (${DOW[selectedDate.getDay()]})`;
});
document.getElementById('deleteEventBtn').addEventListener('click', deletePersonalEvent);
document.getElementById('cancelEventBtn').addEventListener('click', closeEventDialog);
document.getElementById('closeDialogBtn').addEventListener('click', closeEventDialog);
document.getElementById('eventDialog').addEventListener('click', event => {
  if (event.target === event.currentTarget) closeEventDialog();
});

// 핵심 날짜 계산과 하드코딩 테이블의 경계값을 지키는 최소 자체 점검.
(function selfTest() {
  console.assert(dateKey(addDays(parseDateStr('2026-01-31'), 1)) === '2026-02-01', '월 경계 날짜 계산 실패');
  console.assert(dateKey(addDays(parseDateStr('2024-02-28'), 1)) === '2024-02-29', '윤년 날짜 계산 실패');
  console.assert(dateKey(addDays(parseDateStr('2026-07-10'), 25)) === '2026-08-04', '오프셋 날짜 계산 실패');
  console.assert(HOLIDAYS['2024-02-12'] === '대체공휴일(설날)', '2024 설날 대체공휴일 누락');
  console.assert(HOLIDAYS['2028-10-03'] === '추석 · 개천절', '2028 중복 공휴일 누락');
  console.assert(HOLIDAYS['2032-12-27'] === '대체공휴일(성탄절)', '2032 공휴일 경계 누락');
  console.assert(!HOLIDAYS['2025-07-17'] && HOLIDAYS['2026-07-17'] === '제헌절', '제헌절 공휴일 시행 연도 오류');
  console.assert(HOLIDAYS['2027-07-19'] === '대체공휴일(제헌절)' && HOLIDAYS['2032-07-19'] === '대체공휴일(제헌절)', '제헌절 대체공휴일 누락');
  console.assert(ANNIVERSARIES['07-17'] === '제헌절', '기념일 테이블 누락');
})();

render();
refreshHolidays(viewYear);
if (location.protocol === 'file:') showFirebaseFileMode(); else showFirebaseSignedOut();
</script>
</body>
